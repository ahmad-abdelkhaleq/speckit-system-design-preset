schema_version: "1.0"

preset:
  id: "speckit-system-design"
  name: "System Design Phase Preset"
  version: "1.0.3"
  description: "Introduces a formal System Design phase between the clarify and plan phases."
  author: "Ahmad Abdelkhaleq"
  repository: "https://github.com/ahmad-abdelkhaleq/speckit-system-design-preset"
  license: "MIT"

requires:
  speckit_version: ">=0.1.0"

provides:
  templates:
    - type: "command"
      name: "speckit.system-design"
      file: "commands/speckit.system-design.md"
      description: "Enforces a formal discussion-first C4 architectural modeling workflow."
    - type: "command"
      name: "speckit.plan"
      file: "commands/speckit.plan.md"
      description: "Overrides default planning to strictly enforce alignment with system-design.md."
      replaces: "speckit.plan"
    - type: "template"
      name: "system-design"
      file: "templates/system-design.md"
      description: "Aggregates C4 diagrams and architectural decision logs."

tags:
  - "architecture"
  - "design"
  - "workflow"
